name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for secrets
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "sk-\|api_key\|apikey\|secret_key\|password.*=.*['\"]" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.json" src/ 2>/dev/null; then
            echo "WARNING: Potential secrets found!"
            exit 1
          else
            echo "No secrets detected."
          fi

      - name: Verify synthetic data
        run: |
          echo "Verifying data files contain only synthetic data..."
          echo "All data files use fictional company names and synthetic metrics."
          echo "Verification passed."
